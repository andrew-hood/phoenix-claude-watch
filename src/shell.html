<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; frame-src http: https:; style-src 'self' 'unsafe-inline'; script-src 'self'"
    />
    <title>Claude Observe</title>
    <link rel="stylesheet" href="shell.css" />
  </head>
  <body>
    <div id="app">
      <iframe
        id="phoenix-frame"
        src="about:blank"
        sandbox="allow-same-origin allow-scripts allow-forms allow-popups"
      ></iframe>
      <div id="drag-handle"></div>
      <div id="claude-panel">
        <!-- Header -->
        <div class="panel-header">
          <div class="panel-header-left">
            <i data-lucide="eye" class="panel-title-icon"></i><span class="panel-title">Claude Observe</span>
            <span
              id="health-status"
              class="health-dot unhealthy"
              title="Checking..."
            ></span>
            <span id="cli-version" class="cli-version"></span>
          </div>
          <button id="btn-settings" class="panel-btn" title="Settings"></button>
          <!-- <button id="panel-collapse" class="panel-btn" title="Collapse panel">◀</button> -->
        </div>

        <!-- Tab Bar -->
        <div class="tab-bar">
          <button class="tab-btn active" data-tab="observe">Observe</button>
          <button class="tab-btn" data-tab="history">History</button>
          <button class="tab-btn" data-tab="schedules">Schedules</button>
        </div>

        <!-- Tab: Observe -->
        <div id="tab-observe" class="tab-content">
          <!-- Context -->
          <div id="context-bar" class="context-bar hidden">
            <span id="context-icon" class="context-icon"></span>
            <span id="context-label" class="context-label"></span>
            <span id="context-detail" class="context-detail"></span>
            <button id="context-action" class="context-action-btn hidden" title="Run contextual analysis"></button>
          </div>

          <!-- Output -->
          <div class="panel-section output-section">
            <div id="progress-bar" class="progress-bar hidden"></div>
            <div id="output-empty" class="output-empty">
              <span class="output-empty-icon"><i data-lucide="terminal"></i></span>
              <span class="output-empty-text">Run a command to get started</span>
              <div id="command-pills" class="command-pills"></div>
            </div>
            <div id="output-content" class="output-content hidden"></div>
            <div id="scroll-indicator" class="scroll-indicator hidden">
              <i data-lucide="chevron-down"></i> New output
            </div>
          </div>

          <!-- Toolbar -->
          <div class="panel-toolbar">
            <span id="toolbar-status" class="toolbar-status"></span>
            <div class="toolbar-actions">
              <button id="btn-cancel" class="toolbar-btn hidden" title="Cancel">
                <i data-lucide="x"></i> Cancel
              </button>
              <button id="btn-copy" class="toolbar-btn" title="Copy output">
                <i data-lucide="copy"></i> <span id="btn-copy-text">Copy</span>
              </button>
              <button id="btn-clear" class="toolbar-btn" title="Clear output">
                <i data-lucide="trash-2"></i> Clear
              </button>
            </div>
          </div>
        </div>

        <!-- Tab: History -->
        <div id="tab-history" class="tab-content hidden">
          <div id="full-history-list" class="full-history-list"></div>
        </div>

        <!-- Tab: Schedules -->
        <div id="tab-schedules" class="tab-content hidden">
          <div class="tab-placeholder">
            <span class="tab-placeholder-icon"><i data-lucide="clock"></i></span>
            <span>Recurring tasks — coming soon</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-overlay" class="hidden">
      <div id="settings-modal">
        <div class="settings-header">
          <span class="settings-title">Settings</span>
          <button id="settings-close" class="settings-close-btn">&times;</button>
        </div>
        <div class="settings-body">
          <label class="settings-label" for="setting-phoenix-url">Phoenix URL</label>
          <input type="text" id="setting-phoenix-url" class="settings-input" placeholder="http://localhost:6006" autocomplete="off" />

          <label class="settings-label" for="setting-api-key">Phoenix API Key</label>
          <input type="password" id="setting-api-key" class="settings-input" placeholder="Leave blank if not required" autocomplete="off" />

          <label class="settings-label" for="setting-working-dir">Agent Source Repository</label>
          <div class="settings-row">
            <input type="text" id="setting-working-dir" class="settings-input" placeholder="~/path/to/agent-repo" autocomplete="off" />
            <button id="setting-browse" class="settings-browse-btn">Browse</button>
          </div>

          <div class="settings-toggle-row">
            <label class="settings-label" for="setting-auto-save">Auto-save Analyses</label>
            <label class="toggle-switch">
              <input type="checkbox" id="setting-auto-save" />
              <span class="toggle-slider"></span>
            </label>
          </div>

          <label class="settings-label">Default Model</label>
          <div class="settings-theme-group">
            <button class="settings-theme-btn settings-model-btn active" data-model="sonnet">Sonnet</button>
            <button class="settings-theme-btn settings-model-btn" data-model="opus">Opus</button>
            <button class="settings-theme-btn settings-model-btn" data-model="haiku">Haiku</button>
          </div>

          <label class="settings-label">Theme</label>
          <div class="settings-theme-group">
            <button class="settings-theme-btn active" data-theme-mode="system">System</button>
            <button class="settings-theme-btn" data-theme-mode="dark">Dark</button>
            <button class="settings-theme-btn" data-theme-mode="light">Light</button>
          </div>
        </div>
        <div class="settings-footer">
          <button id="settings-cancel" class="settings-btn">Cancel</button>
          <button id="settings-save" class="settings-btn settings-btn-primary">Save</button>
        </div>
      </div>
    </div>

    <!-- Drag overlay (covers iframe during resize) -->
    <div id="drag-overlay" class="hidden"></div>

    <script src="marked.umd.js"></script>
    <script src="lucide.min.js"></script>
    <script src="shell.js"></script>
  </body>
</html>
